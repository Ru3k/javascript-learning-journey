<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="wikipedia.css" />

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
</head>

<body>
    <div class="main-container">
        <div class="wiki-search-header text-center">
            <img class="wiki-logo"
                src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/wiki-logo-img.png" />
            <br />

            <input 
                id="searchInput"
                placeholder="Type a keyword and press Enter to search" 
                type="search" 
                class="search-input w-100" 
            />
        </div>

        <div class="d-none" id="spinner">
            <div class="d-flex justify-content-center">
                <div class="spinner-border" role="status"></div>
            </div>
        </div>

        <div id="searchResults" class="search-results"></div>
    </div>

    <script src="wikipedia.js"></script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 0 rgba(34, 211, 238, 0.1)); }
            50% { filter: drop-shadow(0 0 18px rgba(34, 211, 238, 0.5)); }
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_#101a2b,_#05060b_62%)] px-4 py-6 text-white">
        <div class="mx-auto flex min-h-[calc(100vh-3rem)] w-full max-w-5xl flex-col justify-center gap-8">
            <div class="flex items-center justify-between gap-4">
                <a href="index.html" class="group inline-flex items-center gap-3 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-white/10">
                    <span class="relative grid h-9 w-9 place-items-center rounded-full bg-cyan-400/15 ring-1 ring-cyan-300/20" style="animation: float 4s ease-in-out infinite;">
                        <span class="absolute inset-0 rounded-full border border-cyan-300/40" style="animation: spinSlow 8s linear infinite;"></span>
                        <span class="text-[11px] font-black tracking-[0.28em] text-cyan-100">CSO</span>
                    </span>
                    <span>Back to Home</span>
                </a>
                <a href="Login.html" class="rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-white/20">
                    Login
                </a>
            </div>

            <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr] lg:items-center">
                <div class="relative overflow-hidden rounded-[2rem] border border-white/10 bg-white/5 p-6 shadow-[0_30px_80px_rgba(0,0,0,0.45)] backdrop-blur-sm sm:p-10" style="transform-style:preserve-3d; perspective:1200px;">
                    <div class="pointer-events-none absolute -left-10 top-4 h-40 w-40 rounded-full bg-cyan-400/12 blur-3xl"></div>
                    <div class="pointer-events-none absolute bottom-0 right-0 h-52 w-52 rounded-full bg-fuchsia-500/10 blur-3xl"></div>

                    <div class="mb-6 flex items-center justify-between gap-4">
                        <div>
                            <p class="text-xs uppercase tracking-[0.32em] text-cyan-100/70">Cat Motion Mode</p>
                            <h1 class="mt-2 text-3xl font-bold sm:text-4xl">Bulb and Cat, but 3D</h1>
                        </div>
                        <div class="hidden rounded-full border border-emerald-300/20 bg-emerald-300/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.24em] text-emerald-100 sm:inline-flex" style="animation: pulseGlow 3s ease-in-out infinite;">
                            Active motion
                        </div>
                    </div>

                    <div class="relative flex min-h-[420px] flex-col items-center justify-center gap-5" style="transform: translateZ(40px);">
                        <div class="absolute top-0 h-28 w-28 rounded-full bg-cyan-300/10 blur-3xl"></div>
                        <div class="relative" style="animation: float 4.5s ease-in-out infinite;">
                            <img src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png" class="w-[clamp(90px,28vw,160px)] drop-shadow-[0_18px_28px_rgba(34,211,238,0.15)]" id="bulbImage" />
                        </div>
                        <div class="relative" style="animation: float 5.2s ease-in-out infinite; animation-delay: -1s;">
                            <img src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-img.png" class="w-full max-w-[320px] px-4 drop-shadow-[0_22px_30px_rgba(0,0,0,0.45)]" id="catImage" />
                        </div>
                    </div>
                </div>

                <div class="space-y-6 rounded-[2rem] border border-white/10 bg-white/6 p-6 shadow-[0_30px_80px_rgba(0,0,0,0.35)] backdrop-blur-sm sm:p-8" style="transform: perspective(1000px) rotateY(-6deg);">
                    <div class="rounded-[1.5rem] border border-white/10 bg-[#7b8794]/90 p-6 shadow-[inset_0_1px_0_rgba(255,255,255,0.18)]">
                        <h2 class="text-white font-roboto text-2xl font-medium mb-6" id="switchStatus">
                            Switched On
                        </h2>
                        <div class="flex flex-col gap-4 sm:flex-row">
                            <button class="w-full rounded-lg bg-[#e12d39] text-white font-roboto text-2xl font-bold transition duration-300 hover:-translate-y-1 hover:shadow-[0_14px_24px_rgba(225,45,57,0.35)]" onclick="switchOff()" id="offSwitch">
                                OFF
                            </button>
                            <button class="w-full rounded-lg bg-[#cbd2d9] text-white font-roboto text-2xl font-bold transition duration-300 hover:-translate-y-1 hover:shadow-[0_14px_24px_rgba(203,210,217,0.2)]" onclick="switchOn()" id="onSwitch">
                                ON
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm text-white/70">
                        <div class="rounded-2xl border border-white/10 bg-black/20 p-4">
                            3D cards
                        </div>
                        <div class="rounded-2xl border border-white/10 bg-black/20 p-4">
                            Motion logo
                        </div>
                        <div class="rounded-2xl border border-white/10 bg-black/20 p-4">
                            Responsive
                        </div>
                        <div class="rounded-2xl border border-white/10 bg-black/20 p-4">
                            Playful glow
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="Cat.js"></script>
</body>

</html>
